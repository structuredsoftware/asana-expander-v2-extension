name: release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version change
        id: version_change
        run: |
          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q '^package.json$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read version
        id: version
        if: steps.version_change.outputs.changed == 'true'
        run: |
          version=$(node -p 'require("./package.json").version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Check tag exists
        id: tag
        if: steps.version_change.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = `v.${{ steps.version.outputs.version }}`;
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
              });
              core.setOutput("exists", "true");
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("exists", "false");
                return;
              }
              throw error;
            }

      - name: Create release
        if: steps.version_change.outputs.changed == 'true' && steps.tag.outputs.exists != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = `v.${{ steps.version.outputs.version }}`;
            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: tagName,
              generate_release_notes: true,
            });

      - name: Append changelog link
        if: steps.version_change.outputs.changed == 'true' && steps.tag.outputs.exists != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = `v.${{ steps.version.outputs.version }}`;
            const { data } = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: tagName,
            });
            const changelog = `Changelog: https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md`;
            const existingBody = data.body || "";
            const newBody = existingBody.includes(changelog)
              ? existingBody
              : existingBody
                ? `${existingBody}\n\n${changelog}`
                : changelog;
            await github.rest.repos.updateRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: data.id,
              body: newBody,
              name: tagName,
            });
