name: release

on:
  push:
    branches:
      - main

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version change
        id: version_change
        run: |
          if git diff --name-only "${{ github.event.before }}" "${{ github.sha }}" | grep -q '^package.json$'; then
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Read version
        id: version
        if: steps.version_change.outputs.changed == 'true'
        run: |
          version=$(node -p 'require("./package.json").version')
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Set tag name
        id: tag_name
        if: steps.version_change.outputs.changed == 'true'
        run: |
          echo "tag_name=v${{ steps.version.outputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Check tag exists
        id: tag
        if: steps.version_change.outputs.changed == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = "${{ steps.tag_name.outputs.tag_name }}";
            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tagName}`,
              });
              core.setOutput("exists", "true");
            } catch (error) {
              if (error.status === 404) {
                core.setOutput("exists", "false");
                return;
              }
              throw error;
            }

      - name: Create release
        if: steps.version_change.outputs.changed == 'true' && steps.tag.outputs.exists != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const tagName = "${{ steps.tag_name.outputs.tag_name }}";
            const fs = require("fs");
            const changelog = fs.readFileSync("CHANGELOG.md", "utf8");
            const sectionRegex = new RegExp(
              `^##\\s+${tagName.replaceAll(".", "\\.")}\\s+.*$([\\s\\S]*?)(^##\\s+|\\Z)`,
              "m",
            );
            const match = changelog.match(sectionRegex);
            const sectionBody = match ? match[1].trim() : "";
            const changes = sectionBody
              .split("\n")
              .filter((line) => line.trim().startsWith("- "))
              .map((line) => line.trim());
            const changeLines = changes.length > 0 ? changes : ["- No changes listed."];

            const tags = await github.paginate(github.rest.repos.listTags, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100,
            });
            const previousTag = tags.find((tag) => tag.name !== tagName)?.name;
            const compareUrl = previousTag
              ? `https://github.com/${context.repo.owner}/${context.repo.repo}/compare/${previousTag}...${tagName}`
              : `https://github.com/${context.repo.owner}/${context.repo.repo}/commits/${tagName}`;
            const body = [
              "# Changes",
              "",
              ...changeLines,
              "",
              `**Full Changelog**: ${compareUrl}`,
            ].join("\n");

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tagName,
              name: tagName,
              body,
            });
